[project]
name = "backtest"
version = "0.1.0"
description = "QRP backtest package — walk-forward strategy-spec backtests over signals factors (own database)."
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.115",
    "pydantic>=2",
    "psycopg[binary]>=3.2",
    "portfolio",   # save-as-portfolio writes a paper portfolio via the portfolios package
    "signals",      # the factor-definition seam (raw_factor) — Q9.4 signals→backtest
    "universe",     # point-in-time universe membership (own DB) — _members roster-fetch
    "optimiser",    # min_variance weighting delegates to the optimiser's covariance solve
]

[tool.uv.sources]
portfolio = { workspace = true }
signals = { workspace = true }
universe = { workspace = true }
optimiser = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/backtest"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "ruff>=0.15.16",
]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
# B008: `Depends(...)` in argument defaults IS the FastAPI dependency-injection idiom.
"src/backtest/router.py" = ["B008"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
