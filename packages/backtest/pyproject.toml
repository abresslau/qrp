[project]
name = "backtest"
version = "0.1.0"
description = "QRP backtest package — walk-forward factor-strategy backtests (own database)."
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.115",
    "pydantic>=2",
    "psycopg[binary]>=3.2",
    "portfolios",   # save-as-portfolio writes a paper portfolio via the portfolios package
]

[tool.uv.sources]
portfolios = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/backtest"]

[tool.ruff]
line-length = 100
