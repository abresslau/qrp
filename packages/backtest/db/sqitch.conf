[core]
	engine = pg
	top_dir = .

# The `backtest` package owns its own Postgres database (`backtest`). The engine reads sym
# read-only (fact_returns / fundamentals / universe_membership) over a separate connection and
# writes runs/points here; the read API is standalone.
#
#   $env:SQITCH_TARGET = "db:pg://postgres@localhost:5432/backtest"

[engine "pg"]
	client = psql
