[project]
name = "commodity"
version = "0.1.0"
description = "QRP commodities package — daily commodity prices (Tier-A continuous front-month futures across energy/metals/agri/softs/livestock), own database."
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.115",
    "pydantic>=2",
    "psycopg[binary]>=3.2",
    "yfinance>=0.2.40",
]

[project.scripts]
commodity = "commodity.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/commodity"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "ruff>=0.15.16",
]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
# B008: `Depends(...)` in argument defaults IS the FastAPI dependency-injection idiom.
"src/commodity/router.py" = ["B008"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
