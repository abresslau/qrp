[core]
	engine = pg
	top_dir = .

# The `commodity` package owns its own Postgres database (`commodity`) under the
# DB-per-package + DuckDB federation topology (supersedes AR-Q4). This is a Sqitch project
# named `commodity`, separate from the `qrp` / `sym` / `macro` / `rates` projects —
# deployed to the `commodity` database.
#
#   $env:SQITCH_TARGET = "db:pg://postgres@localhost:5432/commodity"
#
# Password belongs in a pgpass file, never here.

[engine "pg"]
	client = psql
