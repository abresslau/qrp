[core]
	engine = pg
	top_dir = .

# The `altdata` package owns its own Postgres database (`altdata`) under the DB-per-package +
# DuckDB federation topology. Read API is standalone (series rows carry ticker/name/detail
# labels); the INGEST reads sym read-only (security_symbology) to resolve figis, over a
# separate connection.
#
#   $env:SQITCH_TARGET = "db:pg://postgres@localhost:5432/altdata"

[engine "pg"]
	client = psql
