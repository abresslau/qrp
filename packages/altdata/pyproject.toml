[project]
name = "altdata"
version = "0.1.0"
description = "QRP altdata package — alternative-data signals (Wikimedia attention) (own database)."
requires-python = ">=3.13"
dependencies = ["fastapi>=0.115", "pydantic>=2", "psycopg[binary]>=3.2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/altdata"]

[tool.ruff]
line-length = 100
