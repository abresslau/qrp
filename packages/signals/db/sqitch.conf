[core]
	engine = pg
	top_dir = .

# The `signals` package owns its own Postgres database (`signals`) under the DB-per-package +
# DuckDB federation topology (supersedes AR-Q4). Sqitch project `signals`, deployed to the
# `signals` database (not the sym database). signals' COMPUTE reads sym read-only (cross-DB,
# via psycopg) and writes only here; its read API serves this database's signals.* tables.
#
#   $env:SQITCH_TARGET = "db:pg://postgres@localhost:5432/signals"

[engine "pg"]
	client = psql
