[project]
name = "signals"  # import name avoids stdlib `signal` collision; DB + API stay "signal"
version = "0.1.0"
description = "QRP signal package — derived cross-sectional factors over universes (own database)."
requires-python = ">=3.13"
dependencies = ["fastapi>=0.115", "pydantic>=2", "psycopg[binary]>=3.2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/signals"]

[tool.ruff]
line-length = 100
