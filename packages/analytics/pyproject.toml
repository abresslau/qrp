[project]
name = "analytics"
version = "0.1.0"
description = "QRP analytics package — risk/return metrics over portfolios + the sym package (read-only upstream; no own database)."
requires-python = ">=3.13"
dependencies = ["fastapi>=0.115", "pydantic>=2", "psycopg[binary]>=3.2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/analytics"]

[tool.ruff]
line-length = 100
