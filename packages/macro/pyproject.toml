[project]
name = "macro"
version = "0.1.0"
description = "QRP macro package — macroeconomic / central-bank series (World Bank, ECB), own database."
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.115",
    "pydantic>=2",
    "psycopg[binary]>=3.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/macro"]

[tool.ruff]
line-length = 100
