[project]
name = "macro"
version = "0.1.0"
description = "QRP macro package — macroeconomic / central-bank series (World Bank, ECB, US Treasury FiscalData, OECD, Eurostat), own database."
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.115",
    "pydantic>=2",
    "psycopg[binary]>=3.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/macro"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "ruff>=0.15.16",
]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
# B008: `Depends(...)` in argument defaults IS the FastAPI dependency-injection idiom.
"src/macro/router.py" = ["B008"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
