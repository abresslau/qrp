[core]
	engine = pg
	top_dir = migrations

# The database target is resolved at run time and must NOT be committed with
# credentials. Set it via the environment, e.g. (PowerShell):
#
#   $env:SQITCH_TARGET = "db:pg://postgres@localhost:5432/sym"
#
# or pass `--target` on the command line. A password belongs in %APPDATA%\postgresql\pgpass.conf,
# never here.

[engine "pg"]
	client = psql
