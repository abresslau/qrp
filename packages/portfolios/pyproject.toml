[project]
name = "portfolios"
version = "0.1.0"
description = "QRP portfolios package — clients & weights-first portfolios (own database)."
requires-python = ">=3.11"
dependencies = ["fastapi>=0.115", "pydantic>=2", "psycopg[binary]>=3.2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/portfolios"]

[tool.ruff]
line-length = 100
