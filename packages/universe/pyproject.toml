[project]
name = "universe"
version = "0.1.0"
description = "QRP universe package — research-universe registry + membership (event-log truth + point-in-time projection, multi-source monitors, accuracy gate); own database. Identity resolution is injected (one-way sym -> universe)."
requires-python = ">=3.13"
dependencies = [
    "psycopg[binary]>=3.2",
    "requests>=2.34.2",
]

[project.scripts]
universe = "universe.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/universe"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "ruff>=0.15.16",
]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
