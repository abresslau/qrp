# ---------------------------------------------------------------------------
# forward_split — n-for-1 splits. The classic PR/TR trap: unadjusted price drops
# discontinuously on the split date, so a naive return shows a fake ~-75%/-95%.
# Correct factor derivation must neutralize the split entirely (price-return ~0
# across a pure split). Several here have MULTIPLE splits in the window.
# ---------------------------------------------------------------------------
[[security]]
name = "Apple Inc"
category = "forward_split"
ticker = "AAPL"
mic = "XNAS"
isin = "US0378331005"
note = "4:1 (2020) on top of earlier 7:1 (2014) — multiple forward splits; the canonical adjustment fixture."

[[security]]
name = "Tesla Inc"
category = "forward_split"
ticker = "TSLA"
mic = "XNAS"
isin = "US88160R1014"
note = "5:1 (2020) then 3:1 (2022) — two splits close together stress cumulative-factor chaining."

[[security]]
name = "NVIDIA Corp"
category = "forward_split"
ticker = "NVDA"
mic = "XNAS"
isin = "US67066G1040"
note = "4:1 (2021) and 10:1 (2024) — large ratios; magnifies any off-by-one in factor application."

[[security]]
name = "Amazon.com Inc"
category = "forward_split"
ticker = "AMZN"
mic = "XNAS"
isin = "US0231351067"
note = "20:1 (2022) — extreme ratio; a single missed split here is a ~95% phantom move."

[[security]]
