# sym seed universe — the MVP security set (Story 1.5)
#
# This single committed file is, by design, three things at once:
#   1. the MVP universe that identity resolution + price ingestion run against,
#   2. the corporate-action fixture set the returns engine is tested with, and
#   3. the SM-6 returns-accuracy benchmark set (PR/TR validated per-window
#      against an independent published series).
#
# Names are chosen ADVERSARIALLY, not for market-cap coverage: each one stresses
# a specific way returns math, identity resolution, or survivorship can go wrong.
# A green run here is therefore strong evidence the engine handles the hard cases,
# not just the liquid mega-caps. Keep the adversarial intent when editing — every
# entry should still earn its place by exercising a named failure mode.
#
# Schema per entry ([[security]]):
#   name      (str, required)  human-readable label
#   category  (str, required)  the failure mode this name exercises (see sections)
#   ticker    (str, optional)  exchange ticker; pair with `mic`
#   mic       (str, optional)  ISO-10383 MIC of the listing the ticker trades on
#   isin      (str, optional)  ISO-6166 identifier (exchange-independent)
#   note      (str, optional)  why THIS name is adversarial / what to watch
#
# Rule: every entry MUST yield at least one valid resolution input — i.e. either
# (ticker AND mic) or an isin. The loader enforces this; see src/sym/identity/universe.py.
# All MICs used here are present in migrations/deploy/seed_reference_data.sql.

# ---------------------------------------------------------------------------
# baseline — liquid, well-behaved US large-caps. The CONTROL GROUP: if returns
# are wrong on these, the bug is in the core path, not in corporate-action edge
# handling. Also gives clean TR/PR series to anchor SM-6 tolerances against.
# ---------------------------------------------------------------------------
[[security]]
name = "Microsoft Corp"
category = "baseline"
ticker = "MSFT"
mic = "XNAS"
isin = "US5949181045"
note = "Clean dividend payer, no splits in the modern window — control for the happy path."

[[security]]
name = "Coca-Cola Co"
category = "baseline"
ticker = "KO"
mic = "XNYS"
isin = "US1912161007"
note = "Dividend aristocrat; long uninterrupted quarterly dividend stream stresses TR compounding."

[[security]]
name = "Visa Inc Class A"
