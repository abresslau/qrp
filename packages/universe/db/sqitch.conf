[core]
	engine = pg
	top_dir = .

# The `universe` package owns its own Postgres database (`universe`) under the DB-per-package +
# DuckDB federation topology (supersedes AR-Q4). This is a Sqitch project named `universe`,
# separate from the `qrp` / `sym` / `macro` / `rates` / `commodities` / `fx` projects — deployed
# to the `universe` database.
#
#   $env:SQITCH_TARGET = "db:pg://postgres@localhost:5432/universe"
#
# Password belongs in a pgpass file, never here.

[engine "pg"]
	client = psql
