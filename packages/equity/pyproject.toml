[project]
name = "equity"
version = "0.1.0"
description = "QRP equity package — raw equity prices (OHLCV), explicit corporate-action factors, the deterministic split-adjusted view, and the reproducible PR/TR returns engine; own database. Reads identity/calendar from sym via an injected read-only connection (imports nothing from sym)."
requires-python = ">=3.13"
dependencies = [
    "psycopg[binary]>=3.2",
    "pandas>=2.2",
    "yfinance>=0.2.40",
]

[project.scripts]
equity = "equity.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/equity"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "ruff>=0.15.16",
]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
