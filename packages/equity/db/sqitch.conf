[core]
	engine = pg
	top_dir = .

# The `equity` package owns its own Postgres database (`equity`) under the DB-per-package +
# DuckDB federation topology (supersedes AR-Q4). This is a Sqitch project named `equity`,
# separate from the `qrp` / `sym` / `macro` / `rates` / `commodities` / `fx` / `universe`
# projects — deployed to the `equity` database. Tables live in the `public` schema (like sym)
# so the engine modules moved from sym keep unqualified table names.
#
#   $env:SQITCH_TARGET = "db:pg://postgres@localhost:5432/equity"
#
# Password belongs in a pgpass file, never here.

[engine "pg"]
	client = psql
