[core]
	engine = pg
	top_dir = .

# The `commodities` package owns its own Postgres database (`commodities`) under the
# DB-per-package + DuckDB federation topology (supersedes AR-Q4). This is a Sqitch project
# named `commodities`, separate from the `qrp` / `sym` / `macro` / `rates` projects —
# deployed to the `commodities` database.
#
#   $env:SQITCH_TARGET = "db:pg://postgres@localhost:5432/commodities"
#
# Password belongs in a pgpass file, never here.

[engine "pg"]
	client = psql
