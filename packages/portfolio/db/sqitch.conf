[core]
	engine = pg
	top_dir = .

# The `portfolio` package owns its own Postgres database (`portfolio`) — portfolio data
# (weights-first, over sym_id), split out from the `qrp` database so the Operate job ledger
# (qrp.job) and portfolio data evolve independently. This is where client/tenant-scoped data
# would grow. Reads of sym (labels, fact_returns) are assembled in-app.
#
#   $env:SQITCH_TARGET = "db:pg://postgres@localhost:5432/portfolio"

[engine "pg"]
	client = psql
