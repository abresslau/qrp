[core]
	engine = pg
	top_dir = .

# The qrp package (portfolios + the Operate job ledger) owns its own Postgres database (`qrp`),
# holding the `qrp` schema. This Sqitch project is named `qrp_core` to distinguish it from the
# legacy `qrp` project (db/sqitch.plan) that created+relocated the module schemas in the sym
# database during the migration. Reads of sym (labels, fact_returns) are assembled in-app.
#
#   $env:SQITCH_TARGET = "db:pg://postgres@localhost:5432/qrp"

[engine "pg"]
	client = psql
