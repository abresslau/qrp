[project]
name = "operate"
version = "0.1.0"
description = "QRP operate package — sym's control plane (job ledger in the qrp database; runs sym ops)."
requires-python = ">=3.13"
dependencies = ["fastapi>=0.115", "pydantic>=2", "psycopg[binary]>=3.2", "sym"]

[tool.uv.sources]
sym = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/operate"]

[tool.ruff]
line-length = 100
