[project]
name = "lineage"
version = "0.1.0"
description = "QRP lineage — Dagster code location modeling the platform data DAG as software-defined assets (table-level lineage + documentation across the QRP packages' databases)."
requires-python = ">=3.13"
dependencies = [
    "dagster>=1.9",
    "dagster-webserver>=1.9",
    "dagster-postgres>=0.25",
    "sqlglot>=25",
    "sym",
]

[tool.uv.sources]
sym = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lineage"]

[tool.ruff]
line-length = 100
