[core]
	engine = pg
	top_dir = .

# The `indices` package owns its own Postgres database (`indices`) under the DB-per-package +
# DuckDB federation topology (supersedes AR-Q4). This is a Sqitch project named `indices`,
# separate from the qrp / sym / macro / rates / commodity / fx / universe / equity projects —
# deployed to the `indices` database. Objects live in a dedicated `indices` schema (the
# per-package named-schema convention, matching fx/equity/universe) + a DB-level search_path.
#
#   $env:SQITCH_TARGET = "db:pg://postgres@localhost:5432/indices"
#
# Password belongs in a pgpass file, never here.

[engine "pg"]
	client = psql
