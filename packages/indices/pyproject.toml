[project]
name = "indices"
version = "0.1.0"
description = "QRP indices package — benchmark index level series, the materialized index-returns + 52-week-extremes engine, and the universe→benchmark link; own database. Reads identity (instrument/instrument_xref) from sym and the membership roster from universe via injected read-only connections (imports nothing from sym); depends on equity for the shared return-window math."
requires-python = ">=3.13"
dependencies = [
    "psycopg[binary]>=3.2",
    "pandas>=2.2",
    "yfinance>=0.2.40",
    "equity",
]

[project.scripts]
indices = "indices.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/indices"]

[tool.uv.sources]
equity = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "ruff>=0.15.16",
]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
