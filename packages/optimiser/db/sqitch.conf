[core]
	engine = pg
	top_dir = .

# The `optimiser` package owns its own Postgres database (`optimiser`). The engine reads sym
# read-only (fact_returns covariance, fundamentals, security_symbology for the ticker label)
# over a separate connection and writes solutions/weights here; the read API is standalone
# (weights carry the denormalized ticker).
#
#   $env:SQITCH_TARGET = "db:pg://postgres@localhost:5432/optimiser"

[engine "pg"]
	client = psql
