[project]
name = "optimiser"
version = "0.1.0"
description = "QRP optimiser package — constrained mean-variance solutions with signal tilts, scored via backtest (own database)."
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.115",
    "pydantic>=2",
    "psycopg[binary]>=3.2",
    "signals",    # tilt scores via the factor seam (Q9.4)
    "backtest",   # candidate scoring via score_weights (Q7.4)
    "portfolios", # save-solution-as-Portfolio via the owning writer (Q7.4)
]

[tool.uv.sources]
signals = { workspace = true }
backtest = { workspace = true }
portfolios = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/optimiser"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "ruff>=0.15.16",
]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
# B008: `Depends(...)` in argument defaults IS the FastAPI dependency-injection idiom.
"src/optimiser/router.py" = ["B008"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
