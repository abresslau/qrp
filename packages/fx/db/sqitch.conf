[core]
	engine = pg
	top_dir = .

# The `fx` package owns its own Postgres database (`fx`) under the DB-per-package +
# DuckDB federation topology (supersedes AR-Q4). This is a Sqitch project named `fx`,
# separate from the `qrp` / `sym` / `macro` / `rates` / `commodities` projects —
# deployed to the `fx` database.
#
#   $env:SQITCH_TARGET = "db:pg://postgres@localhost:5432/fx"
#
# Password belongs in a pgpass file, never here.

[engine "pg"]
	client = psql
