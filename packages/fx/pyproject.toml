[project]
name = "fx"
version = "0.1.0"
description = "QRP fx package — USD-base foreign-exchange rates (multi-source, immutable, reconciled), with derived on-read conversion/restatement primitives; own database."
requires-python = ">=3.13"
dependencies = [
    "psycopg[binary]>=3.2",
    "requests>=2.34.2",
]

[project.scripts]
fx = "fx.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fx"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "ruff>=0.15.16",
]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
