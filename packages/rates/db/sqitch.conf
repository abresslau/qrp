[core]
	engine = pg
	top_dir = .

# The `rates` package owns its own Postgres database (`rates`) under the DB-per-package +
# DuckDB federation topology (supersedes AR-Q4). This is a Sqitch project named `rates`,
# separate from the `qrp` / `sym` / `macro` projects ‚Äî deployed to the `rates` database.
#
#   $env:SQITCH_TARGET = "db:pg://postgres@localhost:5432/rates"
#
# Password belongs in a pgpass file, never here.

[engine "pg"]
	client = psql
