# QRP (Quant Research Platform) — single source of truth for branding + enabled modules.
# Provisional name; change it here and the API title + console shell follow.

[platform]
name = "QRP"
tagline = "Quant Research Platform"
theme = "dark"

# Module registry. `enabled` is a feature toggle (engineering, not licensing).
# The API mounts a module's routes, and the console shows its nav, only when enabled.
# Order here is the order in the console rail. `monitor` is a frontend-only VIEW area (market
# boards over existing sym/portfolios data) — it has no backend router, so nothing is mounted for it.
[[modules]]
key = "monitor"
name = "Monitor"
description = "Market boards — world equity indices, heat map, portfolio live"
enabled = true

# Data/ETL observability. Unlike `monitor` (frontend-only market boards) this area mounts a thin
# backend router (`/api/data-monitor/*`) that aggregates per-package freshness + Dagster runs.
[[modules]]
key = "data-monitor"
name = "Data Monitor"
description = "Data/ETL observability — per-bucket EOD freshness + pipeline runs"
enabled = true

[[modules]]
key = "sym"
name = "Sym"
description = "Security master · prices · returns · FX · fundamentals"
enabled = true

[[modules]]
key = "macro"
name = "Macro"
description = "Macroeconomic / central-bank data"
enabled = true

[[modules]]
key = "rates"
name = "Rates"
description = "Fixed-income yield curves (Bank of England UK curves)"
enabled = true

[[modules]]
key = "commodities"
name = "Commodities"
description = "Daily commodity prices — energy, metals, agriculture, softs, livestock"
enabled = true

[[modules]]
key = "altdata"
