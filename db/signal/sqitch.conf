[core]
	engine = pg
	top_dir = .

# The `signal` package owns its own Postgres database (`signal`) under the DB-per-package +
# DuckDB federation topology (supersedes AR-Q4). Sqitch project `signal`, deployed to the
# `signal` database (not the sym database). signal's COMPUTE reads sym read-only (cross-DB,
# via psycopg) and writes only here; its read API serves this database's signal.* tables.
#
#   $env:SQITCH_TARGET = "db:pg://postgres@localhost:5432/signal"

[engine "pg"]
	client = psql
