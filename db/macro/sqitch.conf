[core]
	engine = pg
	top_dir = .

# The `macro` package owns its own Postgres database (`macro`) under the DB-per-package +
# DuckDB federation topology (supersedes AR-Q4). This is a Sqitch project named `macro`,
# separate from the `qrp` project — deployed to the `macro` database, not the sym database.
#
#   $env:SQITCH_TARGET = "db:pg://postgres@localhost:5432/macro"
#
# Password belongs in a pgpass file, never here.

[engine "pg"]
	client = psql
