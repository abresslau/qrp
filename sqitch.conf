[core]
	engine = pg
	top_dir = db

# QRP owns its schemas (qrp, macro, signal, backtest, optimiser, altdata) on the SHARED
# Postgres alongside sym (AR-Q4: schema-per-module). This is a SECOND Sqitch project
# (%project=qrp in db/sqitch.plan) deployed to the same database as sym; the sqitch registry
# distinguishes them by project name, so the two migration histories coexist cleanly.
#
# The database target is resolved at run time and must NOT be committed with credentials.
# Set it via the environment, e.g. (PowerShell):
#
#   $env:SQITCH_TARGET = "db:pg://postgres@localhost:5432/sym"
#
# or pass the target on the command line. A password belongs in a pgpass file, never here.

[engine "pg"]
	client = psql
